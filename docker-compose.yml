services:
  loganne:
    build: .
    container_name: loganne
    ports: 
      - $PORT:$PORT
      - "8119:8119"
    environment:
      - PORT
      - CLIENT_KEYS
      - WEBSOCKET_PORT=8119
      - STATE_DIR=/var/lib/loganne
    image: lucas42/lucos_loganne
    volumes:
      - state:/var/lib/loganne
    restart: always
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:${PORT}/_info"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  state:
